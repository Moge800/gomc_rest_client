name: publish

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Sync package version from release tag
        if: github.event_name == 'release'
        shell: bash
        env:
          TAG_VERSION: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          pyproject_path = pathlib.Path("pyproject.toml")
          text = pyproject_path.read_text(encoding="utf-8")
          tag_version = os.environ["TAG_VERSION"].removeprefix("v")

          updated_text, count = re.subn(
              r'(^\[project\]\n(?:.+\n)*?version = ")([^"]+)(")',
              rf'\g<1>{tag_version}\g<3>',
              text,
              count=1,
              flags=re.MULTILINE,
          )

          if count != 1:
              raise SystemExit("project version not found in pyproject.toml")

          pyproject_path.write_text(updated_text, encoding="utf-8")
          PY

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh lockfile from release tag
        if: github.event_name == 'release'
        run: uv lock

      - name: Commit synced package metadata
        if: github.event_name == 'release'
        shell: bash
        run: |
          if git diff --quiet -- pyproject.toml uv.lock; then
            echo "Package metadata already matches the release tag."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock
          git commit -m "chore: sync package version from release tag"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Build distributions
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    needs: build
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  upload_release_assets:
    needs:
      - build
      - publish
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
